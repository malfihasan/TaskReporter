version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskreporter-backend
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - DATA_DIR=/app/data
    restart: unless-stopped
    networks:
      - taskreporter-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskreporter-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
    restart: unless-stopped
    networks:
      - taskreporter-network

networks:
  taskreporter-network:
    driver: bridge
