# Render.com deployment configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: taskreporter-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true
    plan: free
